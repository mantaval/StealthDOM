<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header img {
      width: 28px;
      height: 28px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .header .version {
      font-size: 11px;
      color: #888;
      margin-left: auto;
    }

    /* Toggle Switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle-switch input {
      display: none;
    }

    .toggle-slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #444;
      border-radius: 12px;
      transition: background 0.3s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: #0f3460;
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    /* Status */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #16213e;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #4ade80;
      box-shadow: 0 0 6px #4ade8088;
    }

    .status-dot.disconnected {
      background: #666;
    }

    .status-dot.disabled {
      background: #ef4444;
      box-shadow: 0 0 6px #ef444488;
    }

    .status-text {
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="StealthDOM">
    <h1>StealthDOM</h1>
    <span class="version">v2.4.0</span>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Enabled</span>
    <label class="toggle-switch">
      <input type="checkbox" id="toggleEnabled" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="status">
    <span class="status-dot disconnected" id="statusDot"></span>
    <span class="status-text" id="statusText">Checking...</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
